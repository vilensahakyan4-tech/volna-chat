<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#090b10">
  <title>VOLNA — видеозвонок</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090b10;color:#f4f1ea;font-family:Arial,sans-serif}
    .bar{position:fixed;left:0;right:0;top:0;z-index:5;height:58px;display:flex;align-items:center;gap:10px;padding:10px 14px;background:#090b10e8;border-bottom:1px solid #252a34;backdrop-filter:blur(10px)}
    .logo{font-weight:800;letter-spacing:.12em;margin-right:auto}.logo span{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:#c7ff45;color:#090b10;margin-right:8px}
    a,button{border:0;border-radius:999px;padding:11px 16px;font-weight:700;text-decoration:none;cursor:pointer}
    .next{background:#c7ff45;color:#090b10}.home{background:#171b24;color:#f4f1ea;border:1px solid #303642}
    iframe{position:fixed;inset:58px 0 0 0;width:100%;height:calc(100% - 58px);border:0;background:#fff}
    .fallback{position:fixed;inset:58px 0 0;display:grid;place-content:center;text-align:center;padding:22px;color:#f4f1ea}
    .fallback p{color:#9aa0aa;max-width:520px;line-height:1.6}
    @media(max-width:560px){.bar{height:auto;flex-wrap:wrap}.logo{width:100%;margin-bottom:2px}a,button{flex:1;text-align:center}iframe,.fallback{inset:102px 0 0;height:calc(100% - 102px)}}
  </style>
</head>
<body>
  <div class="bar">
    <div class="logo"><span>V</span>VOLNA</div>
    <a class="next" href="/">Найти нового</a>
    <a class="home" href="/">На главную</a>
  </div>
  <div class="fallback" id="fallback">
    <h1>Открываем звонок…</h1>
    <p>Если звонок не открылся, нажмите “На главную” и начните поиск заново.</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get('room');
    if (room && /^https:\/\/[a-z0-9-]+\.metered\.live\/[a-z0-9-]+$/i.test(room)) {
      const frame = document.createElement('iframe');
      frame.allow = 'camera; microphone; autoplay; fullscreen; display-capture';
      frame.referrerPolicy = 'strict-origin-when-cross-origin';
      frame.src = room;
      frame.onload = () => document.getElementById('fallback')?.remove();
      document.body.append(frame);
    } else {
      document.querySelector('.fallback h1').textContent = 'Комната не найдена';
      document.querySelector('.fallback p').textContent = 'Вернитесь на главную и начните поиск заново.';
    }
  </script>
</body>
</html>
